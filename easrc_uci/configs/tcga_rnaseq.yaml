project:
  name: easrc_tcga
  seed: 0

dataset:
  name: tcga_rnaseq
  loader: tcga
  raw_dir: data/tcga_rnaseq/raw
  processed_dir: data/tcga_rnaseq/processed
  results_dir: results/tcga_rnaseq

split:
  base_train: 0.40
  rejector_train: 0.20
  calibration: 0.20
  test: 0.20
  stratify: true

preprocess:
  standardize: true
  low_variance_filter: false
  top_variance_features: null

base_model:
  type: mlp
  hidden_dims: [512, 128]
  dropout: 0.20
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 64
  epochs: 100
  patience: 15

explain:
  method: grad_input
  perturb_std: 0.01
  stability_repeats: 5
  topk_mass: 100
  xai_weights:
    attr_entropy: 0.4
    attr_instability: 0.4
    inverse_topk_mass: 0.2

# TCGA: real pathway alignment (MSigDB GMT). Replace class_pathways + gmt with your cohort.
proxy_bio:
  enabled: true
  mode: pathway
  gmt_path: data/tcga_rnaseq/raw/pathways/msigdb_hallmark_subset.example.gmt
  random_groups: 10
  # Map label strings in labels.csv -> pathway names (first column of GMT lines).
  # Edit to match your cancer types and biology; unused classes may be omitted (empty group).
  class_pathways:
    BRCA:
      - HALLMARK_ESTROGEN_RESPONSE
    LUAD:
      - HALLMARK_OXIDATIVE_PHOSPHORYLATION
    KIRC:
      - HALLMARK_HYPOXIA
    COAD:
      - HALLMARK_EPITHELIAL_MESENCHYMAL_TRANSITION
    PRAD:
      - HALLMARK_ANDROGEN_RESPONSE

rejector:
  hidden_dims: [64, 32]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 64
  epochs: 100
  patience: 15
  # Tuned via scripts/sweep_rejector_calibration.py (seed 0 TCGA smoke): slightly
  # lower test_xai_risk for EASRCFullProxy vs MaxProb at similar coverage.
  target_gamma: 0.28

# xai_loss on calibration is usually ~0.54–0.58 (xai_unreliability). beta=0.30 is infeasible.
# UCB + modest n_cal often blocks alpha=0.05 even when cls_loss=0; use_ucb false is typical for dev.
calibration:
  alpha: 0.05
  beta: 0.60
  delta: 0.10
  n_thresholds: 200
  min_empirical_coverage: 0.05
  use_ucb: false

methods:
  - NoReject
  - MaxProb
  - Entropy
  - Margin
  - Energy
  - ConfOnly
  - XAIOnly
  - BioOnlyProxy
  - EASRCFullProxy

seeds: [0, 1, 2, 3, 4]
